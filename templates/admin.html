<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-box { background: #13131f; padding: 40px; border-radius: 15px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-align: center; color: #8b5cf6; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #a0a0b8; }
        input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1c1c2e; color: white; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #8b5cf6; outline: none; }
        button { width: 100%; padding: 12px; background: #8b5cf6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #7c3aed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #a0a0b8; text-decoration: none; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>Add New Project</h2>
        <form method="POST">
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" name="title" required placeholder="e.g. Portfolio Website">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" required placeholder="Short description of the project..."></textarea>
            </div>
            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" name="tags" required placeholder="e.g. Python, Flask, HTML">
            </div>
            <div class="form-group">
                <label>GitHub Code Link</label>
                <input type="url" name="code_link" required placeholder="https://github.com/...">
            </div>
            <div class="form-group">
                <label>Live Demo Link</label>
                <input type="url" name="demo_link" required placeholder="https://...">
            </div>
            <button type="submit">Add Project</button>
        </form>
        <a href="/" class="back-link">Back to Portfolio</a>
    </div>
</body>
</html>
